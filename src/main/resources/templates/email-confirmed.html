<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verificado - HomeFinance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Reset básico */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f9fafb; /* gray-50 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 28rem; /* max-w-md */
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .app-title {
            font-size: 1.875rem; /* text-3xl */
            font-weight: 800; /* font-extrabold */
            color: #111827; /* gray-900 */
            margin-top: 1.5rem;
        }

        .app-subtitle {
            font-size: 0.875rem; /* text-sm */
            color: #4b5563; /* gray-600 */
            margin-top: 0.5rem;
        }

        .card {
            background-color: #ffffff;
            padding: 2rem 1rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1); /* shadow */
            border-radius: 0.5rem; /* rounded-lg */
            text-align: center;
        }

        @media (min-width: 640px) {
            .card {
                padding: 2rem 2.5rem; /* sm:px-10 */
            }
        }

        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4rem; /* w-16 */
            height: 4rem; /* h-16 */
            border-radius: 9999px; /* rounded-full */
            background-color: #d1fae5; /* emerald-100 */
            margin: 0 auto 1.5rem auto;
        }

        .icon {
            color: #059669; /* emerald-600 */
            width: 2rem;
            height: 2rem;
        }

        .success-title {
            font-size: 1.5rem; /* text-2xl */
            font-weight: 700; /* font-bold */
            color: #111827; /* gray-900 */
            margin-bottom: 0.5rem;
        }

        .success-message {
            font-size: 0.875rem; /* text-sm */
            color: #6b7280; /* gray-500 */
            margin-bottom: 2rem;
            line-height: 1.25rem;
        }

        .btn-primary {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            border-radius: 0.375rem; /* rounded-md */
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); /* shadow-sm */
            font-size: 0.875rem; /* text-sm */
            font-weight: 500; /* font-medium */
            color: #ffffff;
            background-color: #4f46e5; /* indigo-600 */
            text-decoration: none;
            transition: background-color 0.2s ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #4338ca; /* indigo-700 */
        }

        .btn-primary:focus {
            outline: none;
            box-shadow: 0 0 0 2px #ffffff, 0 0 0 4px #4f46e5; /* focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 */
        }
    </style>
    <script>
        function openApp(event) {
            event.preventDefault();

            let pageHidden = false;

            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    pageHidden = true;
                }
            });

            window.location.href = "meuapp://login";

            setTimeout(() => {
                if (!pageHidden) {
                    alert("Falha ao abrir o app, abra o app manualmente.");
                }
            }, 2000);
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 class="app-title">HomeFinance</h2>
            <p class="app-subtitle">Gestão financeira residencial simplificada</p>
        </div>

        <div class="card">
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            
            <h2 class="success-title">Email Verificado!</h2>
            <p class="success-message">
                Seu endereço de email foi verificado com sucesso. Sua conta agora está segura e pronta para uso.
            </p>

            <div>
                <a href="#" class="btn-primary" onclick="openApp(event)">
                    Retornar ao App e Fazer Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
